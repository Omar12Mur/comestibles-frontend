<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Logo de la tienda -->
    <a class="navbar-brand fw-bold" routerLink="/">
      Comestibles La Villa
    </a>

    <!-- Botón para móvil -->
    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Links de la izquierda -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Inicio</a>
        </li>
        <!-- Solo se muestra si el usuario es admin -->
        <li class="nav-item" *ngIf="authService.isAdmin()">
          <a class="nav-link" routerLink="/admin">Panel Admin</a>
        </li>
      </ul>

      <!-- Links de la derecha -->
      <ul class="navbar-nav">

        <!-- Si está logueado -->
        <ng-container *ngIf="authService.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/cart">
              🛒 Carrito
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/orders">Mis Pedidos</a>
          </li>
          <li class="nav-item">
            <span class="nav-link text-warning">
              {{ authService.getUser()?.name }}
            </span>
          </li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm mt-1"
              (click)="logout()">
              Cerrar Sesión
            </button>
          </li>
        </ng-container>

        <!-- Si NO está logueado -->
        <ng-container *ngIf="!authService.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login">Iniciar Sesión</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-warning btn-sm mt-1"
              routerLink="/register">
              Registrarse
            </a>
          </li>
        </ng-container>

      </ul>
    </div>
  </div>
</nav>
